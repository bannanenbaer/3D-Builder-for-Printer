<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink {
        0%, 49%, 51%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes wave {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(20deg); }
        75% { transform: rotate(-20deg); }
      }
      .mascot-body { animation: float 3s ease-in-out infinite; }
      .mascot-eye { animation: blink 4s ease-in-out infinite; }
      .mascot-arm { transform-origin: 50% 0%; }
      .mascot-arm.wave { animation: wave 0.6s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="260" rx="50" ry="12" fill="#00000020"/>

  <!-- Main Body Group -->
  <g class="mascot-body">
    
    <!-- Body (Turquoise with gradient) -->
    <defs>
      <radialGradient id="bodyGradient" cx="40%" cy="40%">
        <stop offset="0%" style="stop-color:#40D9D9;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#20B2AA;stop-opacity:1" />
      </radialGradient>
      <radialGradient id="headGradient" cx="40%" cy="40%">
        <stop offset="0%" style="stop-color:#4FE5E5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#20B2AA;stop-opacity:1" />
      </radialGradient>
    </defs>

    <!-- Fluffy Body -->
    <ellipse cx="100" cy="160" rx="55" ry="65" fill="url(#bodyGradient)"/>
    
    <!-- Fluffy texture (circles) -->
    <circle cx="70" cy="140" r="8" fill="#20B2AA" opacity="0.3"/>
    <circle cx="130" cy="150" r="10" fill="#20B2AA" opacity="0.3"/>
    <circle cx="85" cy="190" r="9" fill="#20B2AA" opacity="0.3"/>
    <circle cx="115" cy="200" r="8" fill="#20B2AA" opacity="0.3"/>

    <!-- Head -->
    <circle cx="100" cy="80" r="45" fill="url(#headGradient)"/>
    
    <!-- Ears (with robot elements) -->
    <g id="left-ear">
      <ellipse cx="65" cy="45" rx="18" ry="28" fill="#20B2AA" transform="rotate(-25 65 45)"/>
      <!-- Metal accent -->
      <rect x="60" y="35" width="10" height="20" fill="#C0C0C0" rx="2" transform="rotate(-25 65 45)"/>
    </g>
    <g id="right-ear">
      <ellipse cx="135" cy="45" rx="18" ry="28" fill="#20B2AA" transform="rotate(25 135 45)"/>
      <!-- Metal accent -->
      <rect x="130" y="35" width="10" height="20" fill="#C0C0C0" rx="2" transform="rotate(25 135 45)"/>
    </g>

    <!-- Eyes (large and expressive) -->
    <g class="mascot-eye">
      <!-- Left eye white -->
      <circle cx="75" cy="70" r="12" fill="white"/>
      <!-- Left eye pupil -->
      <circle cx="77" cy="72" r="7" fill="#1A1A1A"/>
      <!-- Left eye shine -->
      <circle cx="79" cy="69" r="3" fill="white"/>
      
      <!-- Right eye white -->
      <circle cx="125" cy="70" r="12" fill="white"/>
      <!-- Right eye pupil -->
      <circle cx="123" cy="72" r="7" fill="#1A1A1A"/>
      <!-- Right eye shine -->
      <circle cx="121" cy="69" r="3" fill="white"/>
    </g>

    <!-- Eyebrows (expressive) -->
    <path d="M 65 55 Q 75 50 85 55" stroke="#1A8A7F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 115 55 Q 125 50 135 55" stroke="#1A8A7F" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Nose (cute) -->
    <ellipse cx="100" cy="85" rx="6" ry="8" fill="#1A8A7F"/>

    <!-- Mouth (happy smile) -->
    <path d="M 85 95 Q 100 105 115 95" stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Tongue -->
    <ellipse cx="100" cy="102" rx="5" ry="4" fill="#FF69B4"/>

    <!-- Left Arm (with robot joint) -->
    <g class="mascot-arm">
      <line x1="55" y1="130" x2="25" y2="160" stroke="#20B2AA" stroke-width="12" stroke-linecap="round"/>
      <!-- Robot joint -->
      <circle cx="25" cy="160" r="8" fill="#C0C0C0"/>
      <circle cx="25" cy="160" r="5" fill="#808080"/>
      <!-- Hand -->
      <circle cx="20" cy="170" r="10" fill="#20B2AA"/>
    </g>

    <!-- Right Arm (waving) -->
    <g class="mascot-arm wave">
      <line x1="145" y1="130" x2="175" y2="100" stroke="#20B2AA" stroke-width="12" stroke-linecap="round"/>
      <!-- Robot joint -->
      <circle cx="175" cy="100" r="8" fill="#C0C0C0"/>
      <circle cx="175" cy="100" r="5" fill="#808080"/>
      <!-- Hand -->
      <circle cx="185" cy="85" r="10" fill="#20B2AA"/>
    </g>

    <!-- Left Leg -->
    <g>
      <line x1="80" y1="220" x2="75" y2="250" stroke="#20B2AA" stroke-width="11" stroke-linecap="round"/>
      <!-- Foot -->
      <ellipse cx="75" cy="255" rx="12" ry="8" fill="#1A8A7F"/>
      <!-- Toe pads -->
      <circle cx="68" cy="258" r="3" fill="#1A8A7F"/>
      <circle cx="75" cy="260" r="3" fill="#1A8A7F"/>
      <circle cx="82" cy="258" r="3" fill="#1A8A7F"/>
    </g>

    <!-- Right Leg -->
    <g>
      <line x1="120" y1="220" x2="125" y2="250" stroke="#20B2AA" stroke-width="11" stroke-linecap="round"/>
      <!-- Foot -->
      <ellipse cx="125" cy="255" rx="12" ry="8" fill="#1A8A7F"/>
      <!-- Toe pads -->
      <circle cx="118" cy="258" r="3" fill="#1A8A7F"/>
      <circle cx="125" cy="260" r="3" fill="#1A8A7F"/>
      <circle cx="132" cy="258" r="3" fill="#1A8A7F"/>
    </g>

    <!-- Chest Panel (robot element) -->
    <rect x="85" y="140" width="30" height="35" fill="#C0C0C0" rx="3" opacity="0.6"/>
    <rect x="88" y="143" width="24" height="29" fill="#808080" rx="2"/>
    <!-- Panel lights -->
    <circle cx="95" cy="150" r="2.5" fill="#FF0000"/>
    <circle cx="105" cy="150" r="2.5" fill="#00FF00"/>
    <circle cx="100" cy="160" r="2.5" fill="#0099FF"/>
    <circle cx="95" cy="168" r="2.5" fill="#FFFF00"/>
    <circle cx="105" cy="168" r="2.5" fill="#FF00FF"/>

    <!-- Tail (fluffy) -->
    <path d="M 155 150 Q 180 140 185 110 Q 188 80 175 70" 
          stroke="#20B2AA" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Tail gradient effect -->
    <path d="M 155 150 Q 180 140 185 110 Q 188 80 175 70" 
          stroke="#4FE5E5" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>

  </g>

  <!-- Blush marks (cute) -->
  <circle cx="50" cy="100" r="8" fill="#FF69B4" opacity="0.3"/>
  <circle cx="150" cy="100" r="8" fill="#FF69B4" opacity="0.3"/>

  <!-- Sparkles (happy) -->
  <g opacity="0.7">
    <circle cx="30" cy="50" r="2" fill="#FFD700"/>
    <circle cx="170" cy="60" r="2" fill="#FFD700"/>
    <circle cx="40" cy="120" r="1.5" fill="#FFD700"/>
    <circle cx="160" cy="130" r="1.5" fill="#FFD700"/>
  </g>
</svg>
