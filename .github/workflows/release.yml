name: Build & Auto-Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5
          wix extension add WixToolset.Bal.wixext/4.0.5
          wix extension add WixToolset.Util.wixext/4.0.5

      - name: Build Setup.exe
        run: .\build.ps1 -SkipTests
        shell: pwsh

      - name: Delete existing 'latest' release (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>$null || true
        shell: pwsh

      - name: Create rolling 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "3D Builder Pro – Neueste Version"
          body: |
            ## Automatischer Build

            Dieser Release wird bei **jedem Push auf `main`** automatisch neu erstellt.
            Die App prüft diesen Release beim Klick auf "Update" und lädt die neueste Version.

            **Commit:** `${{ github.sha }}`
            **Erstellt:** ${{ github.event.head_commit.timestamp }}

            ### Installation
            1. `3DBuilderPro-Setup.exe` herunterladen
            2. Doppelklick → alles installiert sich automatisch
          files: Installer/bin/Release/3DBuilderPro-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
